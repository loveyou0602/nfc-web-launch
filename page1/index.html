<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我们的契约</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      /* ========================================= */
      /* ✅ 已更新：你的背景图文件名 */
      background: url('pricebk.png') no-repeat center center fixed;
      /* ========================================= */
      background-size: cover;
      background-color: rgba(0, 0, 0, 0.6);
      background-blend-mode: overlay;

      color: #ffb6c1;
      font-family: 'Noto Serif SC', 'SimSun', 'STSong', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* 文字区域（毛玻璃效果） */
    .text {
      max-width: 340px;
      text-align: center;
      font-size: 18px;
      line-height: 2.0;
      letter-spacing: 2px;
      padding: 28px 24px;
      background: rgba(10, 10, 10, 0.65);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      opacity: 0;
      animation: fadeIn 2.5s forwards;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;

      /* ========================================= */
      /* ✅ 关键修复：加上这一句，让 \n 变成真正的换行 */
      white-space: pre-wrap;
      /* ========================================= */
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    video {
      width: 100%;
      max-width: 380px;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      display: none;
      z-index: 1;
    }

    .play-btn {
      margin-top: 28px;
      padding: 14px 36px;
      font-size: 16px;
      font-family: 'Noto Serif SC', serif;
      color: #0a0a0a;
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 4px;
      box-shadow: 0 4px 20px rgba(255,182,193,.4);
      transition: transform .2s, box-shadow .2s;
      position: relative;
      z-index: 1;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 26px rgba(255,182,193,.6);
    }

    .hint {
      margin-top: 22px;
      font-size: 13px;
      opacity: .35;
      letter-spacing: 1px;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="text" id="text"></div>

  <!-- ========================================= -->
  <!-- ✅ 已更新：你的视频文件名 -->
  <video id="video" src="ourdays.mp4" playsinline x5-playsinline webkit-playsinline></video>
  <!-- ========================================= -->

  <button class="play-btn" onclick="playVideo()">
    碰一下，见证那些我们走过的日子
  </button>

  <div class="hint">视频将在点击后播放</div>

  <script>
    // =========================================
    // 你的文字内容（现在换行肯定生效了）
    const words = [
      "我们把苦难当作肥料\n",
      "我们把磨砺当作甘露\n",
      "我们小心翼翼呵护彼此\n",
      "我们的爱情之花会永远绽放"
    ];
    // =========================================

    let i = 0, j = 0;
    const textEl = document.getElementById('text');

    function typeWriter() {
      if (i < words.length) {
        if (j < words[i].length) {
          textEl.innerHTML += words[i][j++];
          setTimeout(typeWriter, 130);
        } else {
          j = 0;
          i++;
          setTimeout(typeWriter, 400);
        }
      }
    }

    function playVideo() {
      const video = document.getElementById('video');
      video.style.display = 'block';
      video.play();
      document.querySelector('.play-btn').style.display = 'none';
      document.querySelector('.hint').style.display = 'none';
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
